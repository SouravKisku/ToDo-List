<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enhanced To-Do List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>To-Do List</h1>
        <button id="themeToggle" class="toggle-theme">🌙 Dark Mode</button>
        <div class="input-container">
            <input type="text" id="taskInput" placeholder="Task Title">
            <input type="text" id="descriptionInput" placeholder="Task Description">
            <input type="date" id="dateInput">
            <button onclick="addTask()">Add Task</button>
        </div>
        <ul id="taskList"></ul>
    </div>

    <!-- Edit Modal -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <input type="text" id="editTaskInput" placeholder="Edit Title">
            <input type="text" id="editDescriptionInput" placeholder="Edit Description">
            <input type="date" id="editDateInput">
            <div class="modal-buttons">
                <button onclick="saveEdit()">Save</button>
                <button onclick="closeModal()">Cancel</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
